<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Motion Portfolio</title>
  <style>
    html,body {margin:0;padding:0;overflow:hidden;background:repeating-conic-gradient(#ccc 0% 25%,#fff 0% 50%) 0 0 / 16px 16px;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial;}
    h1 {position:fixed;top:0;left:0;padding:1em;margin:1em;background:#fffb;backdrop-filter:blur(2px);z-index:10;font-size:20px;font-weight:600;border-radius:12px;}
    h1 a {text-decoration:none;color:#111;}
    canvas {display:block;width:100%;height:100vh;cursor:grab;}
  </style>

  <script type='importmap'>
    {
      "imports": {
        "three": "https://unpkg.com/three@~0.181/build/three.webgpu.js",
        "three/webgpu": "https://unpkg.com/three@~0.181/build/three.webgpu.js",
        "three/addons/": "https://unpkg.com/three@~0.181/examples/jsm/",
        "YCW_tsl_x": "https://cdn.jsdelivr.net/gh/ycw/tsl-x@5f97a5e8d753d16cefa5ab01036475a92ee51bfd/src/index.js",
        "three/tsl": "https://unpkg.com/three@~0.181/build/three.tsl.js"
      }
    }
  </script>
</head>
<body>

<h1><a href='https://x.com/ycwhk' target='_top'>motionblur</a></h1>

<script type="module">
  import * as THREE from 'three/webgpu'
  import { TSL as $ } from 'three/webgpu'
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js'
  import { GUI } from 'three/addons/libs/lil-gui.module.min.js'
  import { motionBlur } from 'three/addons/tsl/display/MotionBlur.js'
  import * as $$ from 'YCW_tsl_x'

  const gui = new GUI()
  const renderer = await new THREE.WebGPURenderer().init()
  const scene = new THREE.Scene()
  const camera = new THREE.PerspectiveCamera()
  const controls = new OrbitControls(camera, renderer.domElement)

  camera.position.set(2, 2, 2)
  controls.enableDamping = true

  scene.add(new THREE.PointLight('white', 2, 2, 2))
  scene.add(new THREE.HemisphereLight('skyblue', 'brown', 3))

  const mat = new THREE.MeshLambertMaterial({ side: THREE.DoubleSide })
  scene.add(new THREE.Mesh(new THREE.PlaneGeometry(3, 3, 20, 20).rotateX(-Math.PI / 2), mat))

  const height_fn = (p) => $.mx_noise_float(p.mul(3).add($.time.mul(2)), 0.5)
  const p = $.uv()
  mat.positionNode = $.positionLocal.add($.vec3(0, height_fn(p), 0))
  mat.normalNode = $$.bump_field2d(height_fn, p)
  mat.colorNode = $.uv().x.mul(5).fract().step(0.1).rrr

  const pp = new THREE.PostProcessing(renderer)
  {
    const displacement_scale = $.uniform(16)
    const motionblur_samples = $.uniform(16)
    const pass = $.pass(scene, camera)
    pass.setMRT($.mrt({ output: $.output }))
    const displacement = $$.ndc_displacement2d(pass).mul(displacement_scale)
    const output = pass.getTextureNode('output')
    pp.outputNode = motionBlur(output, displacement, motionblur_samples)
    gui.add(displacement_scale, 'value', 0, 100, 1).name('displacement_scale')
    gui.add(motionblur_samples, 'value', 1, 100, 1).name('motionblur_samples')
  }

  renderer.setAnimationLoop(() => {
    controls.update()
    pp.render()
  })

  addEventListener('resize', () => {
    renderer.setPixelRatio(devicePixelRatio)
    renderer.setSize(innerWidth, innerHeight, false)
    camera.aspect = innerWidth / innerHeight
    camera.updateProjectionMatrix()
  })
  dispatchEvent(new Event('resize'))

  document.body.prepend(renderer.domElement)
</script>

</body>
</html>
